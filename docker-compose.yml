x-common-gpu: &common-gpu
#  runtime: nvidia
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

x-common-env-vars: &common-env-vars
  HOST_DIR: ${PWD}
  MOUNT_USB_DIR: ${MOUNT_USB_DIR}
  MOUNT_ODM_DIR: ${MOUNT_ODM_DIR}
  ODM_MEDIA_DIR: ${MOUNT_ODM_DIR}/#project_id#/task/#task_id#
  ODM_DATA_DIR: ${ODM_DATA_DIR}
  ODM_HOST: http://host.docker.internal:8000
  CELERY_BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  REDIS_HOST: redis
  REDIS_PORT: 6379
  DOCKER_HOST: tcp://host.docker.internal:2375
  DOCKER_TLS_VERIFY: ""
  DOCKER_CERT_PATH: ""

x-app-base: &app-base
  build: .
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - .:/app
    - ${USB_DATA_DIR}:${MOUNT_USB_DIR}
    - ${ODM_DATA_DIR}:${MOUNT_ODM_DIR}
  <<: *common-gpu
  depends_on:
    - redis
  networks:
    - app-network
  restart: unless-stopped
  user: "${UID:-1000}:${GID:-1000}"

services:
  # Redis service for Celery broker and result backend
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    restart: unless-stopped

  # Main application service
  app:
    <<: *app-base
    container_name: app
    command: python main.py
    ports:
      - "7700:7700"
    environment: *common-env-vars
    depends_on:
      - redis
    networks:
      - app-network
    restart: unless-stopped

  # Celery worker for default tasks
  worker-default:
    <<: *app-base
    container_name: worker-default
    command: celery -A worker.app worker -Q default -l info -n default@%h -c 1
    environment: *common-env-vars


  # Celery worker for ODM report generation
  worker-generate-odm:
    <<: *app-base
    container_name: worker-generate-odm
    command: celery -A worker.app worker -Q generate_odm_report -l info -n generate@%h -c 1
    environment: *common-env-vars

  # Celery worker for ODM report upload
  worker-upload-odm:
    <<: *app-base
    container_name: worker-upload-odm
    command: celery -A worker.app worker -Q upload_odm_report -l info -n upload@%h -c 1
    environment: *common-env-vars

  # Celery worker for reconstruction tasks
  worker-reconstruction:
    <<: *app-base
    container_name: worker-reconstruction
    command: celery -A worker.app worker -Q reconstruction -l info -n recon@%h -c 1
    environment: *common-env-vars

volumes:
  redis_data:

networks:
  app-network:
    driver: bridge